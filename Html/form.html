<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form1</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <form>
            <h2>Registration</h2>
            <div class="input-group">
                <div>
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>
                <div>
                    <label>Username</label>
                    <input type="text" placeholder="Enter your username">
                </div>
            </div>
            <div class="input-group">
                <div>
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div>
                    <label>Phone Number</label>
                    <input
                    type="number"
                    placeholder="Phone Number"
                    required pattern="[789][0-9]{9}"
                    maxlength="10"
                    title="Phone number must be 10 digits and start with 7, 8, or 9."
                  />
                </div>
            </div>
            <div class="input-group">
                <div>
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required
                    pattern="(?=.*[a-z])(?=.*[A-Z]).{6,}"
                        title="Password must be at least 6 characters long and contain at least one uppercase and one lowercase letter.">  
                         <i class="fas fa-eye eye-icon" id="togglePassword" onclick="togglePasswordVisibility('password')"></i>
                </div>
                <div>
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm your password" required>
                </div>
            </div>
            <div class="gender-group">
                <label>Gender</label>
                <div class="gender-options">
                    <input type="radio" name="gender" id="male"><label for="male">Male</label>
                    <input type="radio" name="gender" id="female"><label for="female">Female</label>
                    <input type="radio" name="gender" id="prefer"><label for="prefer">Prefer not to say</label>
                </div>
            </div>
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
